    function resetControlChooserSession() {
      lastControlChooserTool = null;
      lastControlChooserTarget = null;
      lastControlChooserTime = 0;
    }

    function isSecondControlClick(tool, target) {
      const now = performance.now();
      const isRepeat =
        lastControlChooserTool === tool &&
        lastControlChooserTarget === target &&
        now - lastControlChooserTime <= DOUBLE_TAP_MS;

      if (isRepeat) {
        resetControlChooserSession();
        return true;
      }

      lastControlChooserTool = tool;
      lastControlChooserTarget = target;
      lastControlChooserTime = now;
      return false;
    }

    function currentToolSize(tool) {
      return tool === "eraser" ? state.eraserSize : state.penSize;
    }

    function setToolSize(tool, size) {
      const sizeMap = tool === "eraser" ? ERASER_STROKE_WIDTHS : PEN_STROKE_WIDTHS;
      if (!sizeMap[size]) {
        return;
      }

      if (tool === "eraser") {
        state.eraserSize = size;
      } else {
        state.penSize = size;
      }

      popupSizeButtons.forEach((button) => {
        const isMatch = state.sizePopupTool === tool && button.dataset.popupSize === size;
        button.classList.toggle("active", isMatch);
        button.setAttribute("aria-pressed", String(isMatch));
      });
    }

    function updateSizePopupButtons(tool) {
      const selectedSize = currentToolSize(tool);
      popupSizeButtons.forEach((button) => {
        const size = button.dataset.popupSize;
        const isMatch = size === selectedSize;
        const sizeLabel = size === "xlarge" ? "extra large" : size;
        button.classList.toggle("active", isMatch);
        button.setAttribute("aria-pressed", String(isMatch));
        button.setAttribute("aria-label", `${sizeLabel} ${tool} size`);
      });
    }

    function positionSizePopup() {
      if (!state.sizePopupVisible || !sizePopupAnchor) {
        return;
      }

      const boardTopRect = boardTop.getBoundingClientRect();
      const anchorRect = sizePopupAnchor.getBoundingClientRect();
      const popupRect = toolSizePopup.getBoundingClientRect();
      const margin = 8;
      const left = clamp(
        anchorRect.left + (anchorRect.width / 2) - boardTopRect.left - (popupRect.width / 2),
        margin,
        Math.max(margin, boardTopRect.width - popupRect.width - margin)
      );
      toolSizePopup.style.left = `${left}px`;
      toolSizePopup.style.top = `${-popupRect.height - 12}px`;
    }

    function openSizePopup(tool, anchor) {
      state.sizePopupTool = tool;
      state.sizePopupVisible = true;
      sizePopupAnchor = anchor;
      toolSizePopup.classList.remove("hidden");
      toolSizePopup.setAttribute("aria-hidden", "false");
      updateSizePopupButtons(tool);
      requestAnimationFrame(positionSizePopup);
    }

    function closeSizePopup() {
      state.sizePopupVisible = false;
      state.sizePopupTool = null;
      sizePopupAnchor = null;
      toolSizePopup.classList.add("hidden");
      toolSizePopup.setAttribute("aria-hidden", "true");
      toolSizePopup.style.removeProperty("left");
      toolSizePopup.style.removeProperty("top");
    }

    function toggleCardFlip(card) {
      const isFlipped = card.classList.toggle("flipped");
      card.dataset.caseMode = isFlipped ? "lower" : "upper";
      const visibleChar = isFlipped ? card.dataset.lowercase : card.dataset.uppercase;
      const modeLabel = isFlipped ? "lowercase" : "capital";
      card.setAttribute(
        "aria-label",
        `${modeLabel} ${visibleChar} card. Double-tap to ${isFlipped ? "flip back to capital" : "flip to lowercase"}.`
      );
      setStatus(`Card ${card.dataset.uppercase} flipped to ${modeLabel}.`, "good");
    }

    function createDragPreview(char, cardRect) {
      const preview = document.createElement("div");
      preview.className = "drag-preview";
      preview.style.width = `${Math.max(96, cardRect.width * 0.94)}px`;
      preview.style.height = `${Math.max(144, cardRect.height * 0.94)}px`;

      const image = document.createElement("img");
      image.src = imagePathForCharacter(char);
      image.alt = "";
      image.draggable = false;
      preview.appendChild(image);
      document.body.appendChild(preview);
      return preview;
    }

    function createIconDragPreview(assetId, surface, chipRect) {
      const icon = surface === "board" ? getBoardAssetDef(assetId) : getIconDef(assetId);
      if (!icon) {
        return null;
      }

      const preview = document.createElement("div");
      preview.className = "drag-preview";
      const size = Math.max(88, chipRect.width * 0.98);
      preview.style.width = `${size}px`;
      preview.style.height = `${size}px`;

      const image = document.createElement("img");
      image.src = icon.src;
      image.alt = "";
      image.draggable = false;
      preview.appendChild(image);
      document.body.appendChild(preview);
      return preview;
    }

    function tryCaptureSessionPointer(session) {
      if (!session || session.captured) {
        return;
      }

      const captureTarget = session.type === "bank-card"
        ? session.card
        : session.type === "bank-icon"
          ? session.sourceElement
          : null;

      if (!captureTarget || typeof captureTarget.setPointerCapture !== "function") {
        return;
      }

      try {
        captureTarget.setPointerCapture(session.pointerId);
        session.captured = true;
      } catch (error) {
        session.captured = false;
      }
    }

    function releaseSessionPointer(session) {
      if (!session || !session.captured) {
        return;
      }

      const captureTarget = session.type === "bank-card"
        ? session.card
        : session.type === "bank-icon"
          ? session.sourceElement
          : null;

      if (!captureTarget || typeof captureTarget.releasePointerCapture !== "function") {
        session.captured = false;
        return;
      }

      try {
        if (typeof captureTarget.hasPointerCapture !== "function" || captureTarget.hasPointerCapture(session.pointerId)) {
          captureTarget.releasePointerCapture(session.pointerId);
        }
      } catch (error) {
        // Ignore auto-release behavior on browsers that do not preserve capture state.
      }

      session.captured = false;
    }

    function updateDragPreview(session, clientX, clientY) {
      if (!session.preview) {
        return;
      }

      const previewWidth = session.preview.getBoundingClientRect().width;
      const previewHeight = session.preview.getBoundingClientRect().height;
      session.preview.style.transform = `translate3d(${clientX - (previewWidth / 2)}px, ${clientY - (previewHeight / 2)}px, 0) rotate(-2deg) scale(1.02)`;
    }

    function handleCardTap(card) {
      const now = performance.now();
      const lastTapAt = Number(card.dataset.lastTapAt || 0);

      if (now - lastTapAt <= DOUBLE_TAP_MS) {
        card.dataset.lastTapAt = "0";
        toggleCardFlip(card);
        return;
      }

      card.dataset.lastTapAt = String(now);
    }

    function handleBankCardPointerDown(event) {
      if ((event.pointerType !== "touch" && event.button !== 0) || state.pointerSession) {
        return;
      }

      if (event.pointerType !== "touch") {
        event.preventDefault();
      }
      const card = event.currentTarget;
      const char = card.dataset.caseMode === "lower" ? card.dataset.lowercase : card.dataset.uppercase;
      state.pointerSession = {
        type: "bank-card",
        pointerType: event.pointerType || "mouse",
        pointerId: event.pointerId,
        card,
        char,
        startX: event.clientX,
        startY: event.clientY,
        preview: null,
        captured: false
      };
    }

    function handleIconChipPointerDown(event) {
      if ((event.pointerType !== "touch" && event.button !== 0) || state.pointerSession) {
        return;
      }

      if (event.pointerType !== "touch") {
        event.preventDefault();
      }
      const chip = event.currentTarget;
      state.pointerSession = {
        type: "bank-icon",
        pointerType: event.pointerType || "mouse",
        pointerId: event.pointerId,
        sourceElement: chip,
        assetId: chip.dataset.assetId,
        targetSurface: chip.dataset.surface,
        startX: event.clientX,
        startY: event.clientY,
        preview: null,
        captured: false
      };
    }

    function createPlacedLetter(char, clientPoint = null) {
      if (state.placedItems.length >= 30) {
        setStatus("This spelling board holds up to 30 characters at a time.", "warn");
        return;
      }

      const item = {
        id: state.nextItemId,
        kind: "letter",
        char,
        size: defaultTileSize("letter"),
        x: 0,
        y: 0,
        rotation: 0,
        zIndex: state.nextZIndex += 1
      };
      const position = clientPoint
        ? centeredItemPosition(item, clientPoint.clientX, clientPoint.clientY, item.size)
        : nextAutoPlacement("letter", item.size);
      item.x = position.x;
      item.y = position.y;
      state.placedItems.push(item);
      state.nextItemId += 1;
      renderPlacedSpelling();
      setStatus(`Added ${char}.`, "good");
    }

    function createPlacedIcon(iconId, clientPoint = null) {
      if (state.placedItems.length >= 36) {
        setStatus("This spelling area is full. Clear or remove something before adding more stickers.", "warn");
        return;
      }

      const icon = getIconDef(iconId);
      if (!icon) {
        return;
      }

      const item = {
        id: state.nextItemId,
        kind: "icon",
        char: "",
        iconId,
        label: icon.label,
        src: icon.src,
        size: defaultTileSize("icon"),
        x: 0,
        y: 0,
        rotation: 0,
        zIndex: state.nextZIndex += 1
      };
      const position = clientPoint
        ? centeredItemPosition(item, clientPoint.clientX, clientPoint.clientY, item.size)
        : nextAutoPlacement("icon", item.size);
      item.x = position.x;
      item.y = position.y;
      state.placedItems.push(item);
      state.nextItemId += 1;
      renderPlacedSpelling();
      setStatus(`${icon.label} added.`, "good");
    }

    function addSpace() {
      if (state.placedItems.length >= 30) {
        setStatus("This spelling board holds up to 30 characters at a time.", "warn");
        return;
      }

      const item = {
        id: state.nextItemId,
        kind: "space",
        char: " ",
        size: defaultTileSize("space"),
        x: 0,
        y: 0,
        rotation: 0,
        zIndex: state.nextZIndex += 1
      };
      const position = nextAutoPlacement("space", item.size);
      item.x = position.x;
      item.y = position.y;
      state.placedItems.push(item);
      state.nextItemId += 1;
      renderPlacedSpelling();
      setStatus("Space tile added.", "good");
    }

    function removeLastCharacter() {
      if (!state.placedItems.length) {
        setStatus("There is nothing to remove yet.");
        return;
      }

      const removedItem = state.placedItems.pop();
      renderPlacedSpelling();
      if (!state.placedItems.length) {
        setStatus("All items removed.");
        return;
      }

      if (removedItem.kind === "icon") {
        setStatus(`${removedItem.label} removed.`);
      } else {
        setStatus("Last item removed.");
      }
    }

    function clearSpelling() {
      state.placedItems = [];
      renderPlacedSpelling();
      setStatus("The spelling area is clear.");
    }

    function startSurfaceItemGesture(surface, event, element) {
      if (surface === "board" && state.boardPenMode) {
        return;
      }

      if ((event.pointerType !== "touch" && event.button !== 0) || state.pointerSession) {
        return;
      }

      const item = bringSurfaceItemToFront(surface, element.dataset.itemId);
      if (!item) {
        return;
      }

      event.preventDefault();
      element.classList.add("moving");
      applySurfaceItemStyles(surface, element, item);
      const session = {
        type: "gesture-item",
        surface,
        itemId: item.id,
        element,
        mode: "pending",
        pointers: new Map([
          [event.pointerId, {
            startX: event.clientX,
            startY: event.clientY,
            x: event.clientX,
            y: event.clientY
          }]
        ]),
        startItemX: item.x,
        startItemY: item.y,
        startSize: item.size,
        startRotation: item.rotation || 0,
        holdMode: pointerStartsInResizeZone(surface, item, event.clientX, event.clientY) ? "resize" : "rotate",
        holdTimer: null
      };
      state.pointerSession = session;
      scheduleGestureRotate(session);
    }

    function extendSurfaceItemGesture(surface, event, element) {
      return false;
    }

    function updateSurfaceMoveGesture(session) {
      const item = getSurfaceItem(session.surface, session.itemId);
      const pointer = singleGesturePointer(session);
      if (!item || !pointer) {
        return;
      }

      const nextPosition = clampSurfaceItemPosition(
        session.surface,
        item,
        session.startItemX + (pointer.x - pointer.startX),
        session.startItemY + (pointer.y - pointer.startY)
      );
      item.x = nextPosition.x;
      item.y = nextPosition.y;
      applySurfaceItemStyles(session.surface, session.element, item);
      if (session.surface === "stage") {
        refreshBuiltWord();
      }
    }

    function updateSurfaceRotateGesture(session) {
      const item = getSurfaceItem(session.surface, session.itemId);
      const pointer = singleGesturePointer(session);
      if (!item || !pointer) {
        return;
      }

      const currentAngle = angleBetween(pointer.x, pointer.y, session.centerX, session.centerY);
      const delta = shortestAngleDelta(currentAngle, session.startAngle);
      item.rotation = normalizeRotation(session.startRotation + delta);
      applySurfaceItemStyles(session.surface, session.element, item);
      if (session.surface === "stage") {
        refreshBuiltWord();
      }
    }

    function updateSurfaceResizeGesture(session) {
      const item = getSurfaceItem(session.surface, session.itemId);
      const pointer = singleGesturePointer(session);
      if (!item || !pointer) {
        return;
      }

      const minSize = session.surface === "board" ? MIN_ICON_SIZE : minTileSize(item.kind);
      const currentDistance = Math.max(
        10,
        distanceBetweenPoints(pointer, { x: session.centerX, y: session.centerY })
      );
      const nextSize = clamp(
        Math.round(session.startSize * (currentDistance / session.startDistance)),
        minSize,
        maxSurfaceTileSize(session.surface, item)
      );
      const nextPosition = clampSurfaceItemPosition(
        session.surface,
        item,
        session.centerLocalX - (nextSize / 2),
        session.centerLocalY - (itemHeight(item, nextSize) / 2),
        nextSize
      );
      item.size = nextSize;
      item.x = nextPosition.x;
      item.y = nextPosition.y;
      applySurfaceItemStyles(session.surface, session.element, item);
      if (session.surface === "stage") {
        refreshBuiltWord();
      }
    }

    function startPlacedItemMove(event, tile) {
      if (event.button !== 0 || state.pointerSession) {
        return;
      }

      const item = bringItemToFront(tile.dataset.itemId);
      if (!item) {
        return;
      }

      event.preventDefault();
      tile.classList.add("moving");
      applyPlacedStyles(tile, item);
      state.pointerSession = {
        type: "move-item",
        pointerId: event.pointerId,
        itemId: item.id,
        element: tile,
        startX: event.clientX,
        startY: event.clientY,
        startItemX: item.x,
        startItemY: item.y
      };
    }

    function startPlacedItemResize(event, resizeHandle) {
      if (event.button !== 0 || state.pointerSession) {
        return;
      }

      const tile = resizeHandle.closest(".placed-tile, .space-chip, .placed-icon");
      const item = bringItemToFront(tile.dataset.itemId);
      if (!item) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      tile.classList.add("moving");
      applyPlacedStyles(tile, item);
      state.pointerSession = {
        type: "resize-item",
        pointerId: event.pointerId,
        itemId: item.id,
        element: tile,
        startX: event.clientX,
        startY: event.clientY,
        startSize: item.size
      };
    }

    function startPlacedItemRotate(event, rotateHandle) {
      if (event.button !== 0 || state.pointerSession) {
        return;
      }

      const tile = rotateHandle.closest(".placed-tile, .placed-icon");
      const item = bringItemToFront(tile.dataset.itemId);
      if (!item) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      tile.classList.add("moving");
      applyPlacedStyles(tile, item);
      const rect = stageRect();
      const centerX = rect.left + item.x + (item.size / 2);
      const centerY = rect.top + item.y + (itemHeight(item) / 2);
      state.pointerSession = {
        type: "rotate-item",
        pointerId: event.pointerId,
        itemId: item.id,
        element: tile,
        centerX,
        centerY,
        startRotation: item.rotation || 0,
        startAngle: angleBetween(event.clientX, event.clientY, centerX, centerY)
      };
    }

    function handleSpellStagePointerDown(event) {
      const tile = event.target.closest(".placed-tile, .space-chip, .placed-icon");
      if (tile) {
        if (!state.pointerSession) {
          startSurfaceItemGesture("stage", event, tile);
        }
      }
    }

    function updateMoveSession(session, event) {
      const item = getPlacedItem(session.itemId);
      if (!item) {
        return;
      }

      const nextPosition = clampItemPosition(
        item,
        session.startItemX + (event.clientX - session.startX),
        session.startItemY + (event.clientY - session.startY)
      );
      item.x = nextPosition.x;
      item.y = nextPosition.y;
      applyPlacedStyles(session.element, item);
      refreshBuiltWord();
    }

    function updateRotateSession(session, event) {
      const item = getPlacedItem(session.itemId);
      if (!item) {
        return;
      }

      const currentAngle = angleBetween(event.clientX, event.clientY, session.centerX, session.centerY);
      const delta = shortestAngleDelta(currentAngle, session.startAngle);
      item.rotation = normalizeRotation(session.startRotation + delta);
      applyPlacedStyles(session.element, item);
      refreshBuiltWord();
    }

    function updateResizeSession(session, event) {
      const item = getPlacedItem(session.itemId);
      if (!item) {
        return;
      }

      const ratio = item.kind === "space" ? SPACE_HEIGHT_RATIO : item.kind === "icon" ? 1 : LETTER_HEIGHT_RATIO;
      const deltaX = event.clientX - session.startX;
      const deltaY = (event.clientY - session.startY) / ratio;
      const nextSize = clamp(
        Math.round(session.startSize + Math.max(deltaX, deltaY)),
        minTileSize(item.kind),
        maxTileSize(item.kind)
      );

      item.size = nextSize;
      const nextPosition = clampItemPosition(item, item.x, item.y, nextSize);
      item.x = nextPosition.x;
      item.y = nextPosition.y;
      applyPlacedStyles(session.element, item);
      refreshBuiltWord();
    }

    function finishPointerSession(event) {
      const session = state.pointerSession;
      if (!session || event.pointerId !== session.pointerId) {
        if (session && session.type === "gesture-item" && session.pointers.has(event.pointerId)) {
          session.pointers.delete(event.pointerId);
          finishGestureSession(session);
        }
        return;
      }

      const cancelled = event.type === "pointercancel";

      if (session.type === "gesture-item") {
        session.pointers.delete(event.pointerId);
        finishGestureSession(session);
        return;
      }

      if (session.type === "bank-card") {
        const travel = Math.hypot(event.clientX - session.startX, event.clientY - session.startY);
        session.card.classList.remove("dragging");
        spellStage.classList.remove("drop-ready");
        boardWrap.classList.remove("drop-ready");
        releaseSessionPointer(session);

        if (session.preview) {
          const point = stagePoint(event.clientX, event.clientY);
          if (!cancelled && point.inside) {
            createPlacedLetter(session.char, { clientX: event.clientX, clientY: event.clientY });
          }
          session.preview.remove();
        } else if (!cancelled && travel < DRAG_THRESHOLD) {
          handleCardTap(session.card);
        }
      }

      if (session.type === "bank-icon") {
        const travel = Math.hypot(event.clientX - session.startX, event.clientY - session.startY);
        session.sourceElement.classList.remove("dragging");
        spellStage.classList.remove("drop-ready");
        boardWrap.classList.remove("drop-ready");
        releaseSessionPointer(session);

        if (session.preview) {
          if (session.targetSurface === "board") {
            const point = boardPoint(event.clientX, event.clientY);
            if (!cancelled && point.inside) {
              createBoardSticker(session.assetId, { clientX: event.clientX, clientY: event.clientY });
            }
          } else {
            const point = stagePoint(event.clientX, event.clientY);
            if (!cancelled && point.inside) {
              createPlacedIcon(session.assetId, { clientX: event.clientX, clientY: event.clientY });
            }
          }
          session.preview.remove();
        }
      }

      if (session.element) {
        session.element.classList.remove("moving");
      }

      state.pointerSession = null;
    }

    function handleGlobalPointerMove(event) {
      const session = state.pointerSession;
      if (!session) {
        return;
      }

      if (session.type === "gesture-item") {
        if (!updateGesturePointer(session, event)) {
          return;
        }

        if (session.mode === "pending") {
          const pointer = singleGesturePointer(session);
          if (pointer && Math.hypot(pointer.x - pointer.startX, pointer.y - pointer.startY) > GESTURE_MOVE_THRESHOLD) {
            beginGestureMove(session);
          }
        }

        if (session.mode === "move") {
          event.preventDefault();
          updateSurfaceMoveGesture(session);
        } else if (session.mode === "rotate") {
          event.preventDefault();
          updateSurfaceRotateGesture(session);
        } else if (session.mode === "resize") {
          event.preventDefault();
          updateSurfaceResizeGesture(session);
        }
        return;
      }

      if (event.pointerId !== session.pointerId) {
        return;
      }

      if (session.type === "bank-card") {
        const deltaX = event.clientX - session.startX;
        const deltaY = event.clientY - session.startY;
        const distance = Math.hypot(deltaX, deltaY);
        const horizontalSwipeIntent = session.pointerType === "touch" && Math.abs(deltaX) > DRAG_THRESHOLD && Math.abs(deltaX) > Math.abs(deltaY) * 1.15;

        if (!session.preview && horizontalSwipeIntent) {
          state.pointerSession = null;
          spellStage.classList.remove("drop-ready");
          boardWrap.classList.remove("drop-ready");
          return;
        }

        if (!session.preview && distance > DRAG_THRESHOLD) {
          event.preventDefault();
          session.preview = createDragPreview(session.char, session.card.getBoundingClientRect());
          session.card.classList.add("dragging");
          tryCaptureSessionPointer(session);
        }

        if (session.preview) {
          event.preventDefault();
          updateDragPreview(session, event.clientX, event.clientY);
          spellStage.classList.toggle("drop-ready", stagePoint(event.clientX, event.clientY).inside);
        }
        return;
      }

      if (session.type === "bank-icon") {
        const deltaX = event.clientX - session.startX;
        const deltaY = event.clientY - session.startY;
        const distance = Math.hypot(deltaX, deltaY);
        const horizontalSwipeIntent = session.pointerType === "touch" && Math.abs(deltaX) > DRAG_THRESHOLD && Math.abs(deltaX) > Math.abs(deltaY) * 1.15;

        if (!session.preview && horizontalSwipeIntent) {
          state.pointerSession = null;
          spellStage.classList.remove("drop-ready");
          boardWrap.classList.remove("drop-ready");
          return;
        }

        if (!session.preview && distance > DRAG_THRESHOLD) {
          event.preventDefault();
          session.preview = createIconDragPreview(session.assetId, session.targetSurface, session.sourceElement.getBoundingClientRect());
          session.sourceElement.classList.add("dragging");
          tryCaptureSessionPointer(session);
        }

        if (session.preview) {
          event.preventDefault();
          updateDragPreview(session, event.clientX, event.clientY);
          if (session.targetSurface === "board") {
            boardWrap.classList.toggle("drop-ready", boardPoint(event.clientX, event.clientY).inside);
          } else {
            spellStage.classList.toggle("drop-ready", stagePoint(event.clientX, event.clientY).inside);
          }
        }
        return;
      }

      if (session.type === "move-item") {
        event.preventDefault();
        updateMoveSession(session, event);
        return;
      }

      if (session.type === "resize-item") {
        event.preventDefault();
        updateResizeSession(session, event);
        return;
      }

      if (session.type === "rotate-item") {
        event.preventDefault();
        updateRotateSession(session, event);
        return;
      }

      if (session.type === "move-board-item") {
        event.preventDefault();
        updateBoardMoveSession(session, event);
        return;
      }

      if (session.type === "resize-board-item") {
        event.preventDefault();
        updateBoardResizeSession(session, event);
        return;
      }

      if (session.type === "rotate-board-item") {
        event.preventDefault();
        updateBoardRotateSession(session, event);
      }
    }

    function normalizePlacedItems() {
      state.placedItems.forEach((item) => {
        item.size = clamp(item.size || defaultTileSize(item.kind), minTileSize(item.kind), maxTileSize(item.kind));
        item.rotation = normalizeRotation(item.rotation || 0);
        const nextPosition = clampItemPosition(item, item.x || 0, item.y || 0, item.size);
        item.x = nextPosition.x;
        item.y = nextPosition.y;
      });
    }

    function boardRect() {
      return boardStickerLayer.getBoundingClientRect();
    }

    function boardPoint(clientX, clientY) {
      const rect = boardRect();
      return {
        x: clientX - rect.left,
        y: clientY - rect.top,
        inside: clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom
      };
    }

    function defaultBoardStickerSize() {
      const rect = boardRect();
      if (!rect.width || !rect.height) {
        return 132;
      }

      const candidate = Math.min(rect.width * 0.18, rect.height * 0.28, 240);
      return clamp(Math.round(candidate), MIN_ICON_SIZE, 320);
    }

    function maxBoardStickerSize() {
      const rect = boardRect();
      if (!rect.width || !rect.height) {
        return MAX_BOARD_ICON_SIZE;
      }

      return clamp(Math.floor(Math.min(rect.width - 12, rect.height - 12, MAX_BOARD_ICON_SIZE)), MIN_ICON_SIZE, MAX_BOARD_ICON_SIZE);
    }

    function clampBoardItemPosition(item, nextX, nextY, nextSize = item.size) {
      const rect = boardRect();
      return {
        x: clamp(nextX, 0, Math.max(0, rect.width - nextSize)),
        y: clamp(nextY, 0, Math.max(0, rect.height - nextSize))
      };
    }

    function centeredBoardItemPosition(item, clientX, clientY, nextSize = item.size) {
      const point = boardPoint(clientX, clientY);
      return clampBoardItemPosition(item, point.x - (nextSize / 2), point.y - (nextSize / 2), nextSize);
    }

    function nextBoardPlacement(size = defaultBoardStickerSize()) {
      const rect = boardRect();
      if (!rect.width || !rect.height) {
        return { x: 12, y: 12 };
      }

      const gap = 12;
      const usableWidth = Math.max(1, rect.width - 24);
      const itemsPerRow = Math.max(1, Math.floor(usableWidth / (size + gap)));
      const index = state.boardItems.length;
      const rawX = 12 + (index % itemsPerRow) * (size + gap);
      const rawY = 12 + Math.floor(index / itemsPerRow) * (size + gap);
      return clampBoardItemPosition({ size }, rawX, rawY, size);
    }

    function getBoardItem(itemId) {
      return state.boardItems.find((item) => item.id === Number(itemId));
    }

    function bringBoardItemToFront(itemId) {
      const item = getBoardItem(itemId);
      if (!item) {
        return null;
      }

      item.zIndex = state.nextBoardZIndex += 1;
      return item;
    }

    function applyBoardItemStyles(element, item) {
      element.style.width = `${item.size}px`;
      element.style.height = `${item.size}px`;
      element.style.left = `${Math.round(item.x)}px`;
      element.style.top = `${Math.round(item.y)}px`;
      element.style.transform = `rotate(${normalizeRotation(item.rotation || 0)}deg)`;
      element.style.zIndex = item.zIndex;
    }

    function renderBoardStickers() {
      boardStickerLayer.innerHTML = "";

      [...state.boardItems]
        .sort((a, b) => a.zIndex - b.zIndex)
        .forEach((item) => {
          const sticker = document.createElement("div");
          sticker.className = "board-sticker";
          sticker.dataset.itemId = item.id;
          applyBoardItemStyles(sticker, item);

          const image = document.createElement("img");
          image.src = item.src;
          image.alt = item.label;
          image.draggable = false;
          sticker.appendChild(image);
          boardStickerLayer.appendChild(sticker);
        });
    }

    function createBoardSticker(assetId, clientPoint = null) {
      const icon = getBoardAssetDef(assetId);
      if (!icon) {
        return;
      }

      const item = {
        id: state.nextBoardItemId,
        kind: "icon",
        iconId: assetId,
        label: icon.label,
        src: icon.src,
        size: defaultBoardStickerSize(),
        x: 0,
        y: 0,
        rotation: 0,
        zIndex: state.nextBoardZIndex += 1
      };
      const position = clientPoint
        ? centeredBoardItemPosition(item, clientPoint.clientX, clientPoint.clientY, item.size)
        : nextBoardPlacement(item.size);
      item.x = position.x;
      item.y = position.y;
      state.boardItems.push(item);
      state.nextBoardItemId += 1;
      renderBoardStickers();
    }

    function startBoardStickerMove(event, sticker) {
      if (event.button !== 0 || state.pointerSession) {
        return;
      }

      const item = bringBoardItemToFront(sticker.dataset.itemId);
      if (!item) {
        return;
      }

      event.preventDefault();
      sticker.classList.add("moving");
      applyBoardItemStyles(sticker, item);
      state.pointerSession = {
        type: "move-board-item",
        pointerId: event.pointerId,
        itemId: item.id,
        element: sticker,
        startX: event.clientX,
        startY: event.clientY,
        startItemX: item.x,
        startItemY: item.y
      };
    }

    function startBoardStickerResize(event, resizeHandle) {
      if (event.button !== 0 || state.pointerSession) {
        return;
      }

      const sticker = resizeHandle.closest(".board-sticker");
      const item = bringBoardItemToFront(sticker.dataset.itemId);
      if (!item) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      sticker.classList.add("moving");
      applyBoardItemStyles(sticker, item);
      state.pointerSession = {
        type: "resize-board-item",
        pointerId: event.pointerId,
        itemId: item.id,
        element: sticker,
        startX: event.clientX,
        startY: event.clientY,
        startSize: item.size
      };
    }

    function startBoardStickerRotate(event, rotateHandle) {
      if (event.button !== 0 || state.pointerSession) {
        return;
      }

      const sticker = rotateHandle.closest(".board-sticker");
      const item = bringBoardItemToFront(sticker.dataset.itemId);
      if (!item) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      sticker.classList.add("moving");
      applyBoardItemStyles(sticker, item);
      const rect = boardRect();
      const centerX = rect.left + item.x + (item.size / 2);
      const centerY = rect.top + item.y + (item.size / 2);
      state.pointerSession = {
        type: "rotate-board-item",
        pointerId: event.pointerId,
        itemId: item.id,
        element: sticker,
        centerX,
        centerY,
        startRotation: item.rotation || 0,
        startAngle: angleBetween(event.clientX, event.clientY, centerX, centerY)
      };
    }

    function handleBoardStickerLayerPointerDown(event) {
      if (state.boardPenMode) {
        return;
      }

      const sticker = event.target.closest(".board-sticker");
      if (sticker) {
        if (!state.pointerSession) {
          startSurfaceItemGesture("board", event, sticker);
        }
      }
    }

    function updateBoardMoveSession(session, event) {
      const item = getBoardItem(session.itemId);
      if (!item) {
        return;
      }

      const nextPosition = clampBoardItemPosition(
        item,
        session.startItemX + (event.clientX - session.startX),
        session.startItemY + (event.clientY - session.startY)
      );
      item.x = nextPosition.x;
      item.y = nextPosition.y;
      applyBoardItemStyles(session.element, item);
    }

    function updateBoardResizeSession(session, event) {
      const item = getBoardItem(session.itemId);
      if (!item) {
        return;
      }

      const deltaX = event.clientX - session.startX;
      const deltaY = event.clientY - session.startY;
      const nextSize = clamp(
        Math.round(session.startSize + Math.max(deltaX, deltaY)),
        MIN_ICON_SIZE,
        maxBoardStickerSize()
      );

      item.size = nextSize;
      const nextPosition = clampBoardItemPosition(item, item.x, item.y, nextSize);
      item.x = nextPosition.x;
      item.y = nextPosition.y;
      applyBoardItemStyles(session.element, item);
    }

    function updateBoardRotateSession(session, event) {
      const item = getBoardItem(session.itemId);
      if (!item) {
        return;
      }

      const currentAngle = angleBetween(event.clientX, event.clientY, session.centerX, session.centerY);
      const delta = shortestAngleDelta(currentAngle, session.startAngle);
      item.rotation = normalizeRotation(session.startRotation + delta);
      applyBoardItemStyles(session.element, item);
    }

    function normalizeBoardItems() {
      state.boardItems.forEach((item) => {
        item.size = clamp(item.size || defaultBoardStickerSize(), MIN_ICON_SIZE, maxBoardStickerSize());
        item.rotation = normalizeRotation(item.rotation || 0);
        const nextPosition = clampBoardItemPosition(item, item.x || 0, item.y || 0, item.size);
        item.x = nextPosition.x;
        item.y = nextPosition.y;
      });
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        setStatus("Fullscreen is not available in this browser.", "warn");
      }
    }

    function updateFullscreenLabel() {
      fullscreenBtn.textContent = document.fullscreenElement ? "Exit Fullscreen" : "Fullscreen";
    }

    function openCodeModal() {
      codeModal.classList.remove("hidden");
      codeModal.setAttribute("aria-hidden", "false");
      boardCodeInput.value = "";
      setUnlockMessage("The board will only open after the correct code is entered.");
      requestAnimationFrame(() => boardCodeInput.focus());
    }

    function closeCodeModal() {
      codeModal.classList.add("hidden");
      codeModal.setAttribute("aria-hidden", "true");
    }

    function openBoardModal() {
      boardModal.classList.remove("hidden");
      boardModal.setAttribute("aria-hidden", "false");
      state.boardVisible = true;
      requestAnimationFrame(() => {
        resizeCanvas();
        normalizeBoardItems();
        renderBoardStickers();
      });
    }

    function closeBoardModal() {
      closeSizePopup();
      resetControlChooserSession();
      stopDrawing();
      state.boardVisible = false;
      state.drawing = false;
      state.lastPoint = null;
      boardModal.classList.add("hidden");
      boardModal.setAttribute("aria-hidden", "true");
    }

    function verifyBoardCode() {
      if (boardCodeInput.value.trim() === "143") {
        closeCodeModal();
        openBoardModal();
        setUnlockMessage("Correct code.");
      } else {
        setUnlockMessage("Incorrect code. Try 143.", "bad");
        boardCodeInput.select();
      }
    }

    function setActiveColor(color) {
      state.selectedColor = color;
      setEraserMode(false);
      paletteRow.querySelectorAll(".swatch").forEach((swatch) => {
        swatch.classList.toggle("active", swatch.dataset.color === color);
      });
    }

    function preventBoardZoomGesture(event) {
      if (!state.boardVisible) {
        return;
      }

      if (event.type === "touchstart" || event.type === "touchmove") {
        if (event.touches && event.touches.length > 1) {
          event.preventDefault();
        }
        return;
      }

      event.preventDefault();
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      if (!rect.width || !rect.height) {
        return;
      }

      const previous = document.createElement("canvas");
      previous.width = canvas.width;
      previous.height = canvas.height;

      if (canvas.width && canvas.height) {
        previous.getContext("2d").drawImage(canvas, 0, 0);
      }

      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (previous.width && previous.height) {
        ctx.drawImage(previous, 0, 0, canvas.width, canvas.height);
      }
    }

    function pointFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function currentStrokeWidth() {
      const sizeKey = state.eraserOn ? state.eraserSize : state.penSize;
      const sizeMap = state.eraserOn ? ERASER_STROKE_WIDTHS : PEN_STROKE_WIDTHS;
      return sizeMap[sizeKey] * ((window.devicePixelRatio || 1) * 0.95);
    }

    function drawSegment(from, to) {
      ctx.save();
      ctx.globalCompositeOperation = state.eraserOn ? "destination-out" : "source-over";
      ctx.strokeStyle = state.selectedColor;
      ctx.lineWidth = currentStrokeWidth();
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();
      ctx.restore();
    }

    function drawDot(point) {
      ctx.save();
      ctx.globalCompositeOperation = state.eraserOn ? "destination-out" : "source-over";
      ctx.fillStyle = state.selectedColor;
      ctx.beginPath();
      ctx.arc(point.x, point.y, currentStrokeWidth() / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function startDrawing(event) {
      if (!state.boardVisible || !state.boardPenMode || state.pointerSession) {
        return;
      }

      if (event.pointerType !== "touch" && event.button !== 0) {
        return;
      }

      event.preventDefault();
      state.drawing = true;
      state.lastPoint = pointFromEvent(event);
      drawDot(state.lastPoint);
      boardWrap.setPointerCapture(event.pointerId);
    }

    function continueDrawing(event) {
      if (!state.drawing || !state.boardVisible || !state.boardPenMode) {
        return;
      }

      event.preventDefault();
      const nextPoint = pointFromEvent(event);
      drawSegment(state.lastPoint, nextPoint);
      state.lastPoint = nextPoint;
    }

    function stopDrawing(event) {
      if (!state.drawing) {
        return;
      }

      state.drawing = false;
      state.lastPoint = null;

      if (event && typeof event.pointerId === "number") {
        try {
          if (boardWrap.hasPointerCapture(event.pointerId)) {
            boardWrap.releasePointerCapture(event.pointerId);
          }
        } catch (error) {
          // Ignore release failures from browsers that auto-release capture.
        }
      }
    }

    function clearBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      state.boardItems = [];
      renderBoardStickers();
    }

    function closeCoverScreen() {
      if (!coverScreen || coverScreen.classList.contains("hidden")) {
        return;
      }
      coverScreen.classList.add("hidden");
      coverScreen.setAttribute("aria-hidden", "true");
    }

    function handleKeyboardShortcuts(event) {
      const activeTag = document.activeElement ? document.activeElement.tagName : "";
      const editingField = activeTag === "INPUT" || activeTag === "TEXTAREA";

      if (coverScreen && !coverScreen.classList.contains("hidden")) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          closeCoverScreen();
        }
        return;
      }

      if (event.key === "Escape") {
        if (state.sizePopupVisible) {
          event.preventDefault();
          closeSizePopup();
          return;
        }
        closeCodeModal();
        closeBoardModal();
        return;
      }

      if (editingField) {
        return;
      }

      if (event.key === " ") {
        event.preventDefault();
        addSpace();
      } else if (event.key === "Backspace") {
        event.preventDefault();
        removeLastCharacter();
      }
    }

    enterGameBtn.addEventListener("click", closeCoverScreen);
    openBoardBtn.addEventListener("click", openCodeModal);
    cancelCodeBtn.addEventListener("click", closeCodeModal);
    unlockBtn.addEventListener("click", verifyBoardCode);
    boardCodeInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        verifyBoardCode();
      }
    });

    removeBtn.addEventListener("click", removeLastCharacter);
    clearBtn.addEventListener("click", clearSpelling);
    fullscreenBtn.addEventListener("click", toggleFullscreen);
    document.addEventListener("fullscreenchange", updateFullscreenLabel);
    document.addEventListener("keydown", handleKeyboardShortcuts);
    spellStage.addEventListener("pointerdown", handleSpellStagePointerDown);
    boardStickerLayer.addEventListener("pointerdown", handleBoardStickerLayerPointerDown);
    document.addEventListener("pointermove", handleGlobalPointerMove);
    document.addEventListener("pointerup", finishPointerSession);
    document.addEventListener("pointercancel", finishPointerSession);
    document.addEventListener("pointerdown", (event) => {
      if (!paletteRow.contains(event.target) && event.target !== eraserBtn && !toolSizePopup.contains(event.target)) {
        resetControlChooserSession();
      }
      if (!state.sizePopupVisible) {
        return;
      }
      if (toolSizePopup.contains(event.target)) {
        return;
      }
      if (sizePopupAnchor && sizePopupAnchor.contains(event.target)) {
        return;
      }
      closeSizePopup();
    }, true);

    codeModal.addEventListener("click", (event) => {
      if (event.target === codeModal) {
        closeCodeModal();
      }
    });

    boardModal.addEventListener("click", (event) => {
      if (event.target === boardModal) {
        closeBoardModal();
      }
    });

    swatches.forEach((swatch) => {
      const baseLabel = swatch.getAttribute("aria-label") || "Pencil color";
      swatch.setAttribute("aria-label", `${baseLabel}. Click once to choose or click twice for size.`);
      swatch.addEventListener("click", (event) => {
        const target = event.currentTarget;
        const isDoubleClick = isSecondControlClick("pen", target);
        setActiveColor(target.dataset.color);
        if (isDoubleClick) {
          openSizePopup("pen", target);
        } else {
          closeSizePopup();
        }
      });
    });

    closeBoardBtn.addEventListener("click", closeBoardModal);
    penModeBtn.addEventListener("click", () => {
      setBoardPenMode(!state.boardPenMode);
    });
    eraserBtn.addEventListener("click", () => {
      const isDoubleClick = isSecondControlClick("eraser", eraserBtn);
      setEraserMode(true);
      if (isDoubleClick) {
        openSizePopup("eraser", eraserBtn);
      } else {
        closeSizePopup();
      }
    });
    clearBoardBtn.addEventListener("click", clearBoard);
    boardModeButtons.forEach((button) => {
      button.addEventListener("click", () => setBoardAssetMode(button.dataset.boardMode));
    });
    popupSizeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (!state.sizePopupTool) {
          return;
        }
        setToolSize(state.sizePopupTool, button.dataset.popupSize);
        closeSizePopup();
      });
    });

    boardWrap.addEventListener("pointerdown", startDrawing);
    boardWrap.addEventListener("pointermove", continueDrawing);
    boardWrap.addEventListener("pointerup", stopDrawing);
    boardWrap.addEventListener("pointerleave", stopDrawing);
    boardWrap.addEventListener("pointercancel", stopDrawing);
    ["gesturestart", "gesturechange", "gestureend"].forEach((eventName) => {
      boardModal.addEventListener(eventName, preventBoardZoomGesture, { passive: false });
    });
    boardModal.addEventListener("touchstart", preventBoardZoomGesture, { passive: false });
    boardModal.addEventListener("touchmove", preventBoardZoomGesture, { passive: false });

    window.addEventListener("resize", () => {
      normalizePlacedItems();
      renderPlacedSpelling();
      if (state.boardVisible) {
        resizeCanvas();
        normalizeBoardItems();
        renderBoardStickers();
      }
      if (state.sizePopupVisible) {
        requestAnimationFrame(positionSizePopup);
      }
    });

    renderLetterBank();
    renderIconBank(iconBank, "spell");
    renderBoardAssetBank();
    renderPlacedSpelling();
    renderBoardStickers();
    setActiveColor(state.selectedColor);
    setBoardPenMode(state.boardPenMode);
    setEraserMode(state.eraserOn);
    setToolSize("pen", state.penSize);
    setToolSize("eraser", state.eraserSize);
    updateFullscreenLabel();
    requestAnimationFrame(() => {
      if (enterGameBtn) {
        enterGameBtn.focus();
      }
    });
  </script>
</body>
</html>
