<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Spell &amp; Scribble Studio</title>
  <style>
    :root {
      --ink: #20304a;
      --shadow: 0 24px 48px rgba(41, 48, 76, 0.16);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --success: #1b9f65;
      --warning: #d97900;
      --danger: #d63f52;
      --glow: 0 0 0 2px rgba(255, 223, 122, 0.65), 0 16px 26px rgba(255, 183, 64, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Avenir Next Rounded", "Trebuchet MS", "Gill Sans", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(10, 12, 28, 0.28), rgba(7, 10, 26, 0.44)),
        radial-gradient(circle at 50% 18%, rgba(193, 151, 255, 0.16), transparent 28%),
        radial-gradient(circle at 82% 22%, rgba(107, 212, 255, 0.14), transparent 26%),
        url("assets/game-background-main.png") center center / cover no-repeat;
      background-color: #070b1a;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body::before,
    body::after {
      content: none;
      position: fixed;
      z-index: 0;
      width: 24rem;
      height: 24rem;
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0.28;
      pointer-events: none;
    }

    body::before {
      top: -7rem;
      left: -6rem;
      background: #ffd45f;
    }

    body::after {
      right: -5rem;
      bottom: -6rem;
      background: #7ecff8;
    }

    button,
    input {
      font: inherit;
      -webkit-focus-ring-color: transparent;
    }

    button {
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      transition: box-shadow 0.18s ease, background-color 0.18s ease, border-color 0.18s ease, filter 0.18s ease;
    }

    button:hover {
      box-shadow: 0 12px 22px rgba(32, 48, 74, 0.12);
    }

    button:active {
      filter: brightness(0.98);
    }

    .app {
      position: relative;
      z-index: 1;
      height: 100dvh;
      min-height: 100vh;
      padding: 12px;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      gap: 0;
      overflow: hidden;
    }

    .topbar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 16;
      display: flex;
      justify-content: center;
      align-items: center;
      width: min(calc(100vw - 24px), 1180px);
      pointer-events: none;
    }

    .top-actions {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      overflow-x: auto;
      max-width: 100%;
      padding: 4px 2px;
      pointer-events: auto;
    }

    .action-btn,
    .ghost-btn,
    .tool-btn,
    .close-btn {
      padding: 12px 20px;
      font-weight: 900;
      color: #5a3900;
      background: linear-gradient(180deg, #fff4b5 0%, #ffd54d 54%, #f4b400 100%);
      border: 1px solid rgba(255, 247, 201, 0.95);
      box-shadow:
        0 12px 22px rgba(120, 79, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        inset 0 -1px 0 rgba(164, 103, 0, 0.2);
      white-space: nowrap;
    }

    .action-btn:hover,
    .ghost-btn:hover,
    .tool-btn:hover,
    .close-btn:hover {
      background: linear-gradient(180deg, #fff8c9 0%, #ffde69 56%, #f6bc1d 100%);
      box-shadow:
        0 14px 26px rgba(120, 79, 0, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.78),
        inset 0 -1px 0 rgba(164, 103, 0, 0.22);
    }

    .layout {
      position: relative;
      max-width: none;
      margin: 0 auto;
      width: 100%;
      min-height: 100%;
      overflow: visible;
    }

    .card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: var(--radius-xl);
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.38),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(30px) saturate(165%);
    }

    .game-panel {
      padding: 0;
      min-width: 0;
      height: 100%;
      overflow: visible;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      border-radius: 0;
    }

    .stack {
      position: relative;
      display: grid;
      gap: 14px;
      min-height: 0;
      height: 100%;
      overflow: visible;
    }

    .builder-card {
      position: relative;
      display: block;
      padding: 0;
      background: transparent;
      border: 0;
      min-height: 0;
      box-shadow: none;
      backdrop-filter: none;
      overflow: visible;
    }

    .bank-card {
      position: relative;
      z-index: 10;
      border-radius: var(--radius-lg);
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.07));
      border: 1px solid rgba(255, 255, 255, 0.16);
      min-height: 0;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.34),
        inset 0 -1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(28px) saturate(160%);
      width: min(calc(100vw - 24px), 1540px);
      margin: 0 auto;
    }

    .board-top,
    .board-tools {
      border-radius: var(--radius-lg);
      padding: 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.12));
      border: 1px solid rgba(255, 255, 255, 0.2);
      min-height: 0;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.38),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px) saturate(135%);
    }

    .bank-card {
      display: grid;
      gap: 10px;
    }

    .label {
      display: inline-block;
      margin: 0;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 215, 106, 0.32);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.77rem;
      font-weight: 800;
    }

    .builder-footer,
    .bank-topbar,
    .sticker-topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .bank-topbar {
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .sticker-topbar {
      align-items: flex-start;
    }

    .bank-tip,
    .status,
    .board-note,
    .board-tip,
    .overlay-copy {
      line-height: 1.5;
    }

    .bank-tip {
      margin: 0;
      color: rgba(32, 48, 74, 0.74);
      font-size: 0.94rem;
    }

    .spell-stage {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: block;
      padding: 0;
      border-radius: 0;
      border: 0;
      background: transparent;
      transition: none;
      overflow: visible;
      user-select: none;
      touch-action: none;
      box-shadow: none;
      backdrop-filter: none;
    }

    .spell-stage.drop-ready {
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .placed-tile,
    .space-chip,
    .placed-icon,
    .board-sticker {
      position: absolute;
      left: 0;
      top: 0;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      will-change: transform, width, height;
      transition: transform 0.12s linear, box-shadow 0.18s ease, filter 0.18s ease;
      cursor: grab;
      user-select: none;
      touch-action: none;
      transform-origin: center center;
      will-change: left, top, transform, width, height;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    .placed-tile::after,
    .space-chip::after,
    .placed-icon::after,
    .board-sticker::after {
      content: none;
    }

    .placed-tile {
      aspect-ratio: 2 / 3;
      overflow: visible;
    }

    .placed-icon,
    .board-sticker {
      aspect-ratio: 1 / 1;
      overflow: visible;
      pointer-events: auto;
    }

    .placed-tile.moving,
    .space-chip.moving,
    .placed-icon.moving,
    .board-sticker.moving {
      transition: none;
      cursor: grabbing;
      z-index: 40 !important;
    }

    .placed-tile img,
    .placed-icon img,
    .board-sticker img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 12px 18px rgba(48, 53, 84, 0.18));
      pointer-events: none;
    }

    .board-sticker img {
      filter: none;
    }

    .space-chip {
      background: linear-gradient(180deg, rgba(233, 246, 255, 0.92), rgba(217, 239, 255, 0.88));
      color: rgba(32, 48, 74, 0.68);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 10px 18px rgba(48, 53, 84, 0.1);
      padding-bottom: 6px;
    }

    .builder-actions,
    .tool-actions,
    .palette-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .sticker-section {
      display: grid;
      gap: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(255, 255, 255, 0.16);
      min-height: 0;
    }

    .board-toolbar-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .board-toolbar-row .palette-row,
    .board-toolbar-row .tool-actions {
      margin: 0;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
    }

    .board-control-btn {
      flex: 0 0 116px;
      width: 116px;
      min-height: 56px;
      justify-content: center;
      align-items: center;
      display: inline-flex;
      padding: 14px 12px;
      font-size: 0.98rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .board-control-btn.active {
      background: linear-gradient(180deg, #fff9d7 0%, #ffe27a 52%, #f6bf22 100%);
      box-shadow:
        0 14px 26px rgba(120, 79, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.82),
        inset 0 -1px 0 rgba(164, 103, 0, 0.24);
    }

    .board-sticker-row {
      display: grid;
      gap: 6px;
      margin-top: 8px;
      justify-items: center;
      width: 100%;
    }

    .size-popup {
      position: absolute;
      z-index: 8;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255, 252, 235, 0.98), rgba(255, 241, 206, 0.95));
      border: 1px solid rgba(255, 238, 171, 0.96);
      box-shadow:
        0 18px 30px rgba(73, 49, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        inset 0 -1px 0 rgba(212, 161, 45, 0.18);
      backdrop-filter: blur(14px) saturate(145%);
    }

    .size-popup-btn {
      width: 46px;
      height: 46px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.44);
      border: 1px solid rgba(255, 224, 141, 0.84);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        0 8px 16px rgba(73, 49, 0, 0.12);
    }

    .size-popup-btn.active {
      box-shadow:
        0 0 0 3px rgba(255, 208, 53, 0.95),
        inset 0 1px 0 rgba(255, 255, 255, 0.78),
        0 8px 16px rgba(73, 49, 0, 0.16);
    }

    .size-popup-dot {
      display: block;
      border-radius: 50%;
      background: #111111;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .size-popup-dot.small {
      width: 10px;
      height: 10px;
    }

    .size-popup-dot.medium {
      width: 15px;
      height: 15px;
    }

    .size-popup-dot.large {
      width: 22px;
      height: 22px;
    }

    .size-popup-dot.xlarge {
      width: 28px;
      height: 28px;
    }

    .board-sticker-row .icon-bank.compact {
      gap: 6px;
      padding-bottom: 4px;
      width: 100%;
    }

    .board-sticker-row .icon-bank.compact .icon-chip {
      flex: 0 0 58px;
      padding: 5px;
      border-radius: 16px;
    }

    .icon-bank {
      display: flex;
      flex-wrap: nowrap;
      gap: 4px;
      min-height: 0;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      justify-content: flex-start;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      scroll-behavior: smooth;
      touch-action: pan-x;
    }

    .icon-bank.compact {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      scroll-behavior: smooth;
      touch-action: pan-x;
    }

    .icon-bank.compact .icon-chip {
      flex: 0 0 78px;
    }

    .icon-chip {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      padding: 5px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.14));
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.34),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08);
      touch-action: pan-x;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      flex: 0 0 52px;
      max-width: none;
    }

    .icon-chip.dragging {
      opacity: 0.34;
      transform: scale(0.95) rotate(-1.5deg);
      touch-action: none;
    }

    .icon-chip img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 10px 16px rgba(48, 53, 84, 0.16));
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    #closeBoardBtn,
    #eraserBtn,
    #clearBoardBtn,
    #emojiModeBtn,
    #shapeModeBtn,
    #numberModeBtn {
      padding: 14px 28px;
      min-height: 56px;
      font-size: clamp(0.98rem, 1vw + 0.4rem, 1.12rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #5a3900;
      background: linear-gradient(180deg, #fff4b5 0%, #ffd54d 54%, #f4b400 100%);
      border: 1px solid rgba(255, 247, 201, 0.95);
      box-shadow:
        0 12px 22px rgba(120, 79, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        inset 0 -1px 0 rgba(164, 103, 0, 0.2);
      white-space: nowrap;
    }

    #closeBoardBtn {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 7;
      width: auto;
      min-width: 120px;
      flex: 0 0 auto;
      border-radius: 18px;
    }

    #closeBoardBtn:hover,
    #eraserBtn:hover,
    #clearBoardBtn:hover,
    #emojiModeBtn:hover,
    #shapeModeBtn:hover,
    #numberModeBtn:hover {
      background: linear-gradient(180deg, #fff8c9 0%, #ffde69 56%, #f6bc1d 100%);
      box-shadow:
        0 14px 26px rgba(120, 79, 0, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.78),
        inset 0 -1px 0 rgba(164, 103, 0, 0.22);
    }

    #eraserBtn {
      flex: 0 0 56px;
      width: 56px;
      min-width: 56px;
      padding: 0;
    }

    #eraserBtn svg {
      width: 24px;
      height: 24px;
      display: block;
      pointer-events: none;
    }

    .letter-bank {
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-start;
      gap: 4px;
      max-height: none;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 0 6px;
      min-height: 0;
      width: 100%;
      justify-content: flex-start;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      scroll-behavior: smooth;
      touch-action: pan-x;
    }

    .letter-card {
      position: relative;
      flex: 0 0 56px;
      max-width: none;
      min-height: 78px;
      aspect-ratio: 2 / 3;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: grab;
      perspective: 1400px;
      transform-style: preserve-3d;
      border-radius: 20px;
      outline: none;
      touch-action: pan-x;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .letter-card:focus-visible {
      box-shadow: var(--glow);
    }

    .letter-card.dragging {
      opacity: 0.3;
      transform: scale(0.95) rotate(-1.5deg);
      touch-action: none;
    }

    .letter-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 78px;
      transform-style: preserve-3d;
      will-change: transform;
      transition: transform 0.34s cubic-bezier(0.22, 0.84, 0.24, 1);
    }

    .letter-card.flipped .letter-card-inner {
      transform: rotateY(180deg) scale(1.01);
    }

    .letter-face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      overflow: hidden;
      transform: translateZ(0);
    }

    .letter-face img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 12px 18px rgba(48, 53, 84, 0.18));
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    .letter-face.back {
      transform: rotateY(180deg);
    }

    .drag-preview {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 90;
      pointer-events: none;
      opacity: 0.96;
      transform: translate3d(0, 0, 0) rotate(-2deg) scale(1.02);
      will-change: transform;
      filter: drop-shadow(0 18px 28px rgba(48, 53, 84, 0.22));
    }

    .drag-preview img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      -webkit-user-drag: none;
    }

    button,
    img,
    canvas,
    .spell-stage,
    .board-wrap,
    .swatch {
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    .cover-screen {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(180deg, rgba(7, 10, 27, 0.34), rgba(7, 10, 27, 0.54)),
        radial-gradient(circle at 50% 46%, rgba(255, 222, 138, 0.16), transparent 28%),
        url("assets/cover-page-background.png") center center / cover no-repeat;
    }

    .cover-screen.hidden {
      display: none !important;
    }

    .cover-panel {
      width: min(100%, 1100px);
      padding: clamp(26px, 4vw, 44px);
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(22, 26, 58, 0.28), rgba(12, 18, 42, 0.14));
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow:
        0 28px 52px rgba(11, 14, 31, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.32),
        inset 0 -1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px) saturate(145%);
      text-align: center;
      color: #fff9ef;
    }

    .cover-title {
      margin: 0;
      font-size: clamp(2.4rem, 5.8vw, 5.2rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
      text-shadow: 0 10px 28px rgba(16, 14, 34, 0.42);
    }

    .cover-subtitle {
      margin: 16px auto 0;
      max-width: 760px;
      font-size: clamp(1.05rem, 2vw, 1.55rem);
      line-height: 1.35;
      font-weight: 700;
      color: rgba(255, 247, 228, 0.94);
      text-shadow: 0 8px 20px rgba(16, 14, 34, 0.32);
    }

    .cover-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
    }

    .cover-start-btn {
      padding: 16px 28px;
      font-size: clamp(1rem, 1.2vw + 0.6rem, 1.2rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(25, 35, 58, 0.42);
      backdrop-filter: blur(8px);
    }

    #boardModal {
      padding: 0;
      background: rgba(8, 12, 28, 0.18);
      overscroll-behavior: none;
    }

    .hidden {
      display: none !important;
    }

    .modal-card {
      width: min(100%, 500px);
      padding: 24px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 250, 238, 0.92));
      box-shadow: 0 28px 48px rgba(18, 26, 46, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.78);
    }

    .modal-title,
    .board-title {
      margin: 0;
      font-family: "Chalkboard SE", "Marker Felt", cursive;
      line-height: 1.05;
    }

    .modal-title {
      font-size: clamp(1.8rem, 3vw, 2.4rem);
    }

    .overlay-copy {
      margin: 10px 0 0;
      color: rgba(32, 48, 74, 0.78);
    }

    .unlock-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 18px;
    }

    .unlock-input {
      width: 130px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(32, 48, 74, 0.14);
      background: rgba(255, 255, 255, 0.92);
      font-weight: 800;
      letter-spacing: 0.16em;
      text-align: center;
    }

    .unlock-message {
      margin: 12px 0 0;
      min-height: 1.35em;
      font-weight: 700;
      color: rgba(32, 48, 74, 0.74);
    }

    .unlock-message.good {
      color: var(--success);
    }

    .unlock-message.bad {
      color: var(--danger);
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .board-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      border: 0;
      overflow: hidden;
      backdrop-filter: none;
    }

    .board-inner {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 0;
      display: block;
      overflow: hidden;
    }

    .board-top,
    .board-tools {
      padding: 10px 12px;
      overflow: visible;
    }

    .board-top {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 4;
      width: min(calc(100vw - 24px), 1160px);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.1));
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 18px 34px rgba(18, 26, 46, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.42),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(26px) saturate(155%);
      pointer-events: auto;
    }

    .close-btn {
      white-space: nowrap;
    }

    .palette-row {
      --swatch-size: clamp(42px, 3.4vw, 58px);
      gap: clamp(6px, 0.9vw, 10px);
    }

    .swatch {
      width: var(--swatch-size);
      height: var(--swatch-size);
      flex: 0 0 var(--swatch-size);
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 10px rgba(32, 48, 74, 0.14);
      position: relative;
    }

    .swatch.active::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(32, 48, 74, 0.55);
    }

    .board-wrap {
      position: absolute;
      inset: 0;
      border-radius: 0;
      overflow: hidden;
      border: 0;
      background:
        url("assets/screen-board-background.png") center center / cover no-repeat;
      aspect-ratio: auto;
      width: 100%;
      height: 100%;
      min-height: 0;
      max-width: none;
      margin: 0;
      box-shadow: none;
      touch-action: none;
      cursor: default;
      overscroll-behavior: none;
    }

    .board-wrap.pen-mode {
      cursor: crosshair;
    }

    .board-wrap.drop-ready {
      border-color: rgba(255, 214, 92, 0.88);
      box-shadow:
        0 18px 30px rgba(16, 21, 40, 0.18),
        0 0 0 3px rgba(255, 230, 141, 0.34);
    }

    .board-wrap::before {
      content: none;
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    canvas {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      pointer-events: none;
      background: transparent;
    }

    .board-sticker-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .board-wrap.pen-mode .board-sticker {
      pointer-events: none;
      cursor: crosshair;
    }

    .tool-btn.active {
      background: linear-gradient(180deg, #ffe6d8, #ffb58c);
    }

    @media (orientation: landscape) and (min-width: 900px) {
      .app {
        padding: 8px;
      }

      .topbar {
        top: 8px;
        width: min(calc(100vw - 16px), 1220px);
      }

      .action-btn,
      .ghost-btn,
      .tool-btn,
      .close-btn {
        padding: 11px 18px;
        font-size: 0.95rem;
      }

      .game-panel {
        padding: 0;
      }

      .stack {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .builder-card {
        overflow: visible;
      }

      .bank-card {
        display: grid;
        grid-template-rows: auto auto;
        align-content: start;
        justify-self: center;
        width: min(calc(100vw - 16px), 1540px);
        gap: 6px;
        padding: 8px 10px;
      }

      .spell-stage {
        inset: 0;
      }

      .placed-tile,
      .space-chip,
      .placed-icon,
      .board-sticker {
        width: auto;
        min-height: 0;
      }

      .space-chip {
        width: auto;
        min-height: 0;
      }

      .sticker-section {
        gap: 4px;
        padding-top: 4px;
        justify-items: stretch;
      }

      .letter-bank {
        justify-content: flex-start;
        max-width: 100%;
        margin: 0 auto;
        max-height: none;
        overflow-x: auto;
        overflow-y: hidden;
        gap: 4px;
        padding-bottom: 6px;
      }

      #iconBank {
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
        width: 100%;
        margin: 0 auto;
        gap: 4px;
        padding-bottom: 4px;
        justify-content: flex-start;
      }

      #iconBank .icon-chip {
        flex: 0 0 50px;
        max-width: none;
        padding: 4px;
        border-radius: 14px;
      }

      .icon-bank.compact .icon-chip {
        flex-basis: 72px;
      }

      .board-top {
        bottom: 12px;
        width: min(calc(100vw - 24px), 1180px);
      }

      .letter-card {
        flex-basis: 52px;
        max-width: none;
        min-height: 80px;
      }

      .letter-card-inner {
        min-height: 80px;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 10px;
      }

      .topbar {
        top: 10px;
        width: calc(100vw - 20px);
      }

      .game-panel {
        padding: 14px;
      }

      #boardModal {
        padding: 4px;
      }

      .board-shell {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }

      .board-inner {
        padding: 0;
        gap: 0;
        max-height: 100vh;
        height: 100vh;
      }

      .board-wrap {
        width: 100%;
      }

      .board-top {
        bottom: 10px;
        width: calc(100vw - 20px);
        padding: 10px;
      }

      #closeBoardBtn {
        top: 12px;
        left: 12px;
        min-width: 108px;
      }

      .icon-bank {
        grid-template-columns: repeat(auto-fit, minmax(58px, 1fr));
      }

      .icon-bank.compact .icon-chip {
        flex-basis: 66px;
      }

      .letter-bank {
        gap: 3px;
        max-height: none;
      }

      .letter-card {
        flex-basis: 44px;
        max-width: none;
        min-height: 63px;
      }

      .letter-card-inner {
        min-height: 63px;
      }

      .placed-tile {
        width: auto;
        min-height: 0;
      }

      .placed-icon,
      .board-sticker {
        width: auto;
        min-height: 0;
      }

      .space-chip {
        width: auto;
        min-height: 0;
      }

      canvas {
        height: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="top-actions">
        <button class="action-btn" id="fullscreenBtn" type="button">Fullscreen</button>
        <button class="ghost-btn" id="openBoardBtn" type="button">Open Screen Board</button>
        <button class="ghost-btn" id="removeBtn" type="button">Remove Last</button>
        <button class="action-btn" id="clearBtn" type="button">Clear All</button>
      </div>
    </header>

    <main class="layout">
      <section class="card game-panel">
        <div class="stack">
          <section class="builder-card">
            <div class="spell-stage" id="spellStage" aria-live="polite"></div>

          <section class="bank-card">
            <div class="letter-bank" id="letterBank"></div>
            <section class="sticker-section">
              <div class="icon-bank" id="iconBank" aria-label="Sticker icons"></div>
            </section>
          </section>
        </div>
      </section>
    </main>
  </div>

  <div class="cover-screen" id="coverScreen" aria-hidden="false">

      <h1 class="cover-title">Spell, Write, Design, Enjoy!</h1>
      <p class="cover-subtitle">"Your Imagination is Limitless"</p>
      <div class="cover-actions">
        <button class="action-btn cover-start-btn" id="enterGameBtn" type="button">Start Creating</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="codeModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="codeModalTitle">
      <p class="label">Board Access</p>
      <h2 class="modal-title" id="codeModalTitle">Enter the board code</h2>
      <p class="overlay-copy">Type <strong>143</strong> to unlock the Screen Board pop-up.</p>
      <div class="unlock-row">
        <input

          type="text"
          inputmode="numeric"

          placeholder="143"
          aria-label="Board unlock code"

  </div>

  <div class="modal-backdrop hidden" id="boardModal" aria-hidden="true">
    <div class="board-shell" role="dialog" aria-modal="true" aria-label="Screen Board">
      <div class="board-inner">
        <button class="close-btn board-control-btn" id="closeBoardBtn" type="button">Close</button>
        <div class="board-wrap" id="boardWrap">
          <canvas id="drawCanvas"></canvas>
          <div class="board-sticker-layer" id="boardStickerLayer" aria-hidden="true"></div>
        </div>

        <section class="board-top">
          <div class="board-toolbar-row">
            <div class="palette-row" id="paletteRow" aria-label="Pencil colors">
              <button class="swatch active" type="button" data-color="#ff69b4" style="background:#ff69b4" aria-label="Pink pencil"></button>
              <button class="swatch" type="button" data-color="#ffd84d" style="background:#ffd84d" aria-label="Yellow pencil"></button>
              <button class="swatch" type="button" data-color="#38b86c" style="background:#38b86c" aria-label="Green pencil"></button>
              <button class="swatch" type="button" data-color="#2d7ff9" style="background:#2d7ff9" aria-label="Blue pencil"></button>
              <button class="swatch" type="button" data-color="#e53935" style="background:#e53935" aria-label="Red pencil"></button>
              <button class="swatch" type="button" data-color="#101010" style="background:#101010" aria-label="Black pencil"></button>
              <button class="swatch" type="button" data-color="#7c4dff" style="background:#7c4dff" aria-label="Purple pencil"></button>
              <button class="swatch" type="button" data-color="#8b93a1" style="background:#8b93a1" aria-label="Gray pencil"></button>
            </div>
            <div class="tool-actions">
              <button class="tool-btn board-control-btn active" id="penModeBtn" type="button">Pen: On</button>
              <button class="tool-btn board-control-btn" id="eraserBtn" type="button" aria-label="Eraser tool off. Click once to choose eraser or click twice for eraser size.">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M8.2 18.4h9.2c.5 0 1-.2 1.3-.6l2.2-2.2c.6-.6.6-1.6 0-2.2L13 5.7a1.55 1.55 0 0 0-2.2 0L3.1 13.4a1.55 1.55 0 0 0 0 2.2l2.2 2.2c.4.4.8.6 1.4.6h1.5Z" fill="#fff8df" stroke="#915800" stroke-width="1.4" stroke-linejoin="round"/>
                  <path d="M10.1 8.6 16 14.5" stroke="#915800" stroke-width="1.4" stroke-linecap="round"/>
                  <path d="M5.7 18.4h13.8" stroke="#915800" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
              </button>
              <button class="ghost-btn board-control-btn" id="clearBoardBtn" type="button">Clear All</button>
              <button class="ghost-btn board-control-btn active" id="emojiModeBtn" type="button" data-board-mode="emoji">Emojis</button>
              <button class="ghost-btn board-control-btn" id="shapeModeBtn" type="button" data-board-mode="shape">Shapes</button>
              <button class="ghost-btn board-control-btn" id="numberModeBtn" type="button" data-board-mode="number">Numbers</button>

            </button>

          <div class="board-sticker-row">
            <div class="icon-bank compact" id="boardIconBank" aria-label="Screen Board sticker icons"></div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    const state = {
      placedItems: [],
      nextItemId: 1,
      nextZIndex: 1,
      boardItems: [],
      nextBoardItemId: 1,
      nextBoardZIndex: 1,
      boardAssetMode: "emoji",
      boardPenMode: true,
      sizePopupVisible: false,
      sizePopupTool: null,
      selectedColor: "#ff69b4",
      penSize: "medium",
      eraserSize: "medium",
      eraserOn: false,
      drawing: false,
      lastPoint: null,
      boardVisible: false,
      pointerSession: null
    };

    const coverScreen = document.getElementById("coverScreen");
    const enterGameBtn = document.getElementById("enterGameBtn");
    const letterBank = document.getElementById("letterBank");
    const iconBank = document.getElementById("iconBank");
    const boardIconBank = document.getElementById("boardIconBank");
    const spellStage = document.getElementById("spellStage");
    const builtWord = document.getElementById("builtWord");
    const statusText = document.getElementById("statusText");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const openBoardBtn = document.getElementById("openBoardBtn");
    const removeBtn = document.getElementById("removeBtn");
    const clearBtn = document.getElementById("clearBtn");
    const codeModal = document.getElementById("codeModal");
    const boardModal = document.getElementById("boardModal");
    const boardCodeInput = document.getElementById("boardCodeInput");
    const unlockBtn = document.getElementById("unlockBtn");
    const unlockMessage = document.getElementById("unlockMessage");
    const cancelCodeBtn = document.getElementById("cancelCodeBtn");
    const paletteRow = document.getElementById("paletteRow");
    const swatches = Array.from(paletteRow.querySelectorAll(".swatch"));
    const penModeBtn = document.getElementById("penModeBtn");
    const closeBoardBtn = document.getElementById("closeBoardBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const clearBoardBtn = document.getElementById("clearBoardBtn");
    const boardModeButtons = Array.from(document.querySelectorAll("[data-board-mode]"));
    const toolSizePopup = document.getElementById("toolSizePopup");
    const popupSizeButtons = Array.from(toolSizePopup.querySelectorAll("[data-popup-size]"));
    const boardTop = document.querySelector(".board-top");
    const boardWrap = document.getElementById("boardWrap");
    const boardStickerLayer = document.getElementById("boardStickerLayer");
    const canvas = document.getElementById("drawCanvas");
    const ctx = canvas.getContext("2d");
    const LETTER_HEIGHT_RATIO = 1.5;
    const SPACE_HEIGHT_RATIO = 0.78;
    const MIN_LETTER_SIZE = 8;
    const MIN_SPACE_SIZE = 12;
    const MIN_ICON_SIZE = 8;
    const MAX_TILE_SIZE = 4000;
    const MAX_BOARD_ICON_SIZE = 4000;
    const DRAG_THRESHOLD = 8;
    const DOUBLE_TAP_MS = 360;
    const LONG_PRESS_MS = 280;
    const GESTURE_MOVE_THRESHOLD = 10;
    const PEN_STROKE_WIDTHS = {
      small: 4,
      medium: 8,
      large: 16,
      xlarge: 26
    };
    const ERASER_STROKE_WIDTHS = {
      small: 14,
      medium: 28,
      large: 44,
      xlarge: 64
    };
    let sizePopupAnchor = null;
    let lastControlChooserTool = null;
    let lastControlChooserTarget = null;
    let lastControlChooserTime = 0;
    function svgToDataUri(svg) {
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function pointsToPath(points) {
      return points.map((point, index) => `${index === 0 ? "M" : "L"}${point.x} ${point.y}`).join(" ") + " Z";
    }

    function regularPolygonPath(sides, radius = 172, rotationDeg = -90, centerX = 256, centerY = 256) {
      const points = Array.from({ length: sides }, (_, index) => {
        const angle = ((rotationDeg + (360 / sides) * index) * Math.PI) / 180;
        return {
          x: Math.round((centerX + Math.cos(angle) * radius) * 1000) / 1000,
          y: Math.round((centerY + Math.sin(angle) * radius) * 1000) / 1000
        };
      });
      return pointsToPath(points);
    }

    function makeBoardShapeAsset(id, label, content) {
      return {
        id,
        label,
        src: svgToDataUri(`
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
            <defs>
              <linearGradient id="shapeFill" x1="96" y1="104" x2="416" y2="408" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#8edcff"/>
                <stop offset="1" stop-color="#8b5eff"/>
              </linearGradient>
              <linearGradient id="shapeStroke" x1="84" y1="72" x2="430" y2="430" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#fff7b0"/>
                <stop offset="0.48" stop-color="#ffd400"/>
                <stop offset="1" stop-color="#ffb300"/>
              </linearGradient>
            </defs>
            ${content}
          </svg>
        `)
      };
    }

    function makeBoardNumberAsset(number) {
      const fontSize = number >= 10 ? 240 : 276;
      const baseline = number >= 10 ? 334 : 340;
      const outerStrokeWidth = number >= 10 ? 38 : 34;
      const innerStrokeWidth = number >= 10 ? 16 : 14;
      return {
        id: `number-${number}`,
        label: `Number ${number}`,
        src: svgToDataUri(`
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
            <defs>
              <linearGradient id="numFill" x1="120" y1="112" x2="392" y2="400" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#8edcff"/>
                <stop offset="1" stop-color="#8b5eff"/>
              </linearGradient>
              <linearGradient id="numOuterStroke" x1="76" y1="62" x2="442" y2="438" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#fff9c9"/>
                <stop offset="0.32" stop-color="#ffe46f"/>
                <stop offset="0.68" stop-color="#ffc821"/>
                <stop offset="1" stop-color="#f4a300"/>
              </linearGradient>
              <linearGradient id="numInnerStroke" x1="92" y1="84" x2="420" y2="414" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#fff6b3"/>
                <stop offset="0.46" stop-color="#ffd53d"/>
                <stop offset="1" stop-color="#ffbc00"/>
              </linearGradient>
            </defs>
            <g
              text-anchor="middle"
              font-family="Avenir Next, Arial Rounded MT Bold, Arial, sans-serif"
              font-weight="900"
              stroke-linejoin="round"
              stroke-linecap="round"
              paint-order="stroke fill"
            >
              <text
                x="256"
                y="${baseline}"
                font-size="${fontSize}"
                fill="none"
                stroke="url(#numOuterStroke)"
                stroke-width="${outerStrokeWidth}"
              >${number}</text>
              <text
                x="256"
                y="${baseline}"
                font-size="${fontSize}"
                fill="url(#numFill)"
                stroke="url(#numInnerStroke)"
                stroke-width="${innerStrokeWidth}"
              >${number}</text>
            </g>
          </svg>
        `)
      };
    }

    const ICON_DEFS = [
      { id: "space-cat", label: "Space Cat", src: "assets/icon-stickers/space-cat.png" },
      { id: "galaxy-bottle", label: "Galaxy Bottle", src: "assets/icon-stickers/galaxy-bottle.png" },
      { id: "double-hearts", label: "Double Hearts", src: "assets/icon-stickers/double-hearts.png" },
      { id: "rocket", label: "Rocket", src: "assets/icon-stickers/rocket.png" },
      { id: "jellyfish", label: "Jellyfish", src: "assets/icon-stickers/jellyfish.png" },
      { id: "ufo-cat", label: "UFO Cat", src: "assets/icon-stickers/ufo-cat.png" },
      { id: "alien-head", label: "Alien Head", src: "assets/icon-stickers/alien-head.png" },
      { id: "ufo-beam", label: "UFO Beam", src: "assets/icon-stickers/ufo-beam.png" },
      { id: "planet", label: "Planet", src: "assets/icon-stickers/planet.png" },
      { id: "crystal-cluster", label: "Crystal Cluster", src: "assets/icon-stickers/crystal-cluster.png" },
      { id: "three-eyed-alien", label: "Three-Eyed Alien", src: "assets/icon-stickers/three-eyed-alien.png" },
      { id: "alien-astronaut", label: "Alien Astronaut", src: "assets/icon-stickers/alien-astronaut.png" },

    const BOARD_ASSET_SETS = {
      emoji: ICON_DEFS,

    };
    const BOARD_ASSET_MAP = new Map(
      [...ICON_DEFS, ...BOARD_SHAPE_DEFS, ...BOARD_NUMBER_DEFS].map((asset) => [asset.id, asset])
    );

    function uppercaseImagePath(letter) {
      return `uppercase-transparent/alphabet-letter-${letter}-4k.png`;
    }

    function lowercaseImagePath(letter) {
      return `lowercase-transparent/alphabet-letter-${letter}-4k.png`;
    }

    function imagePathForCharacter(char) {
      return char === char.toUpperCase() ? uppercaseImagePath(char) : lowercaseImagePath(char);
    }

    function getIconDef(iconId) {
      return ICON_DEFS.find((icon) => icon.id === iconId) || null;
    }

    function getBoardAssetDef(assetId) {
      return BOARD_ASSET_MAP.get(assetId) || null;
    }

    function setStatus(message, tone = "") {
      if (!statusText) {
        return;
      }
      statusText.textContent = message;
      statusText.className = `status${tone ? ` ${tone}` : ""}`;
    }

    function setUnlockMessage(message, tone = "") {
      unlockMessage.textContent = message;
      unlockMessage.className = `unlock-message${tone ? ` ${tone}` : ""}`;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function normalizeRotation(value) {
      let normalized = value % 360;
      if (normalized > 180) {
        normalized -= 360;
      }
      if (normalized <= -180) {
        normalized += 360;
      }
      return Math.round(normalized);
    }

    function angleBetween(clientX, clientY, centerX, centerY) {
      return (Math.atan2(clientY - centerY, clientX - centerX) * 180) / Math.PI;
    }

    function shortestAngleDelta(currentAngle, startAngle) {
      let delta = currentAngle - startAngle;
      while (delta > 180) {
        delta -= 360;
      }
      while (delta < -180) {
        delta += 360;
      }
      return delta;
    }

    function distanceBetweenPoints(firstPoint, secondPoint) {
      return Math.hypot(secondPoint.x - firstPoint.x, secondPoint.y - firstPoint.y);
    }

    function midpointBetweenPoints(firstPoint, secondPoint) {
      return {
        x: (firstPoint.x + secondPoint.x) / 2,
        y: (firstPoint.y + secondPoint.y) / 2
      };
    }

    function getSurfaceItem(surface, itemId) {
      return surface === "board" ? getBoardItem(itemId) : getPlacedItem(itemId);
    }

    function bringSurfaceItemToFront(surface, itemId) {
      return surface === "board" ? bringBoardItemToFront(itemId) : bringItemToFront(itemId);
    }

    function surfaceRect(surface) {
      return surface === "board" ? boardRect() : stageRect();
    }

    function applySurfaceItemStyles(surface, element, item) {
      if (surface === "board") {
        applyBoardItemStyles(element, item);
      } else {
        applyPlacedStyles(element, item);
      }
    }

    function maxSurfaceTileSize(surface, item) {
      return surface === "board" ? maxBoardStickerSize() : maxTileSize(item.kind);
    }

    function clampSurfaceItemPosition(surface, item, nextX, nextY, nextSize = item.size) {
      if (surface === "board") {
        return clampBoardItemPosition(item, nextX, nextY, nextSize);
      }
      return clampItemPosition(item, nextX, nextY, nextSize);
    }

    function itemCenterInViewport(surface, item) {
      const rect = surfaceRect(surface);
      return {
        x: rect.left + item.x + (item.size / 2),
        y: rect.top + item.y + (itemHeight(item) / 2)
      };
    }

    function pointerStartsInResizeZone(surface, item, clientX, clientY) {
      const rect = surfaceRect(surface);
      const localX = clientX - rect.left;
      const localY = clientY - rect.top;
      const width = item.size;
      const height = itemHeight(item);
      return (
        localX >= item.x &&
        localX <= item.x + width &&
        localY >= item.y + height * 0.62 &&
        localY <= item.y + height
      );
    }

    function clearGestureHold(session) {
      if (session && session.holdTimer) {
        clearTimeout(session.holdTimer);
        session.holdTimer = null;
      }
    }

    function singleGesturePointer(session) {
      return session.pointers.values().next().value || null;
    }

    function updateGesturePointer(session, event) {
      const pointer = session.pointers.get(event.pointerId);
      if (pointer) {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
      }
      return pointer;
    }

    function beginGestureMove(session) {
      const item = getSurfaceItem(session.surface, session.itemId);
      if (!item) {
        return;
      }

      clearGestureHold(session);
      session.mode = "move";
      session.startItemX = item.x;
      session.startItemY = item.y;
    }

    function beginGestureRotate(session) {
      const item = getSurfaceItem(session.surface, session.itemId);
      const pointer = singleGesturePointer(session);
      if (!item || !pointer) {
        return;
      }

      clearGestureHold(session);
      session.mode = "rotate";
      session.startRotation = item.rotation || 0;
      const center = itemCenterInViewport(session.surface, item);
      session.centerX = center.x;
      session.centerY = center.y;
      session.startAngle = angleBetween(pointer.x, pointer.y, center.x, center.y);
    }

    function beginGestureResize(session) {

      if (!item) {

      session.mode = "resize";
      session.startSize = item.size;
      session.centerLocalX = item.x + (item.size / 2);
      session.centerLocalY = item.y + (itemHeight(item) / 2);
      const center = itemCenterInViewport(session.surface, item);
      session.centerX = center.x;
      session.centerY = center.y;
      session.startDistance = pointer
        ? Math.max(18, distanceBetweenPoints(pointer, { x: session.centerX, y: session.centerY }))
        : Math.max(18, item.size / 2);
    }

    function minTileSize(kind = "letter") {
      if (kind === "space") {
        return MIN_SPACE_SIZE;
      }
      if (kind === "icon") {
        return MIN_ICON_SIZE;
      }
      return MIN_LETTER_SIZE;
    }

    function itemHeight(item, size = item.size) {
      if (item.kind === "icon") {
        return Math.round(size);
      }
      const ratio = item.kind === "space" ? SPACE_HEIGHT_RATIO : LETTER_HEIGHT_RATIO;
      return Math.round(size * ratio);
    }

    function stageRect() {
      return {
        left: 0,
        top: 0,
        right: window.innerWidth,
        bottom: window.innerHeight,
        width: window.innerWidth,
        height: window.innerHeight
      };
    }

    function defaultTileSize(kind = "letter") {
      const rect = stageRect();
      if (!rect.width || !rect.height) {
        if (kind === "space") {
          return 112;
        }
        if (kind === "icon") {
          return 108;
        }
        return 136;
      }

      const candidate = kind === "space"
        ? Math.min(rect.width * 0.18, rect.height * 0.24, 164)
        : kind === "icon"
          ? Math.min(rect.width * 0.16, rect.height * 0.24, 170)
          : Math.min(rect.width * 0.19, rect.height * 0.38, 186);

      return clamp(Math.round(candidate), minTileSize(kind), kind === "space" ? 180 : 220);
    }

    function maxTileSize(kind = "letter") {
      const rect = stageRect();
      if (!rect.width || !rect.height) {
        return MAX_TILE_SIZE;
      }

      if (kind === "icon") {
        return clamp(Math.floor(Math.min(rect.height - 16, rect.width - 16, MAX_TILE_SIZE)), minTileSize(kind), MAX_TILE_SIZE);
      }

      const ratio = kind === "space" ? SPACE_HEIGHT_RATIO : LETTER_HEIGHT_RATIO;
      const heightLimited = (rect.height - 16) / ratio;
      const widthLimited = rect.width - 16;
      return clamp(Math.floor(Math.min(heightLimited, widthLimited, MAX_TILE_SIZE)), minTileSize(kind), MAX_TILE_SIZE);
    }

    function stagePoint(clientX, clientY) {
      const rect = stageRect();
      return {
        x: clientX - rect.left,
        y: clientY - rect.top,
        inside: clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom
      };
    }

    function clampItemPosition(item, nextX, nextY, nextSize = item.size) {
      const rect = stageRect();
      const width = nextSize;
      const height = itemHeight(item, nextSize);
      return {
        x: clamp(nextX, 0, Math.max(0, rect.width - width)),
        y: clamp(nextY, 0, Math.max(0, rect.height - height))
      };
    }

    function centeredItemPosition(item, clientX, clientY, nextSize = item.size) {
      const point = stagePoint(clientX, clientY);
      return clampItemPosition(
        item,
        point.x - (nextSize / 2),
        point.y - (itemHeight(item, nextSize) / 2),
        nextSize
      );
    }

    function nextAutoPlacement(kind = "letter", size = defaultTileSize(kind)) {
      const rect = stageRect();
      if (!rect.width || !rect.height) {
        return { x: 12, y: 12 };
      }

      const gap = 12;
      const topPadding = 96;
      const cellHeight = itemHeight({ kind, size }, size);
      const usableWidth = Math.max(1, rect.width - 24);
      const itemsPerRow = Math.max(1, Math.floor(usableWidth / (size + gap)));
      const index = state.placedItems.length;
      const rawX = 12 + (index % itemsPerRow) * (size + gap);
      const rawY = topPadding + Math.floor(index / itemsPerRow) * (cellHeight + gap);
      return clampItemPosition({ kind, size }, rawX, rawY, size);

    function getPlacedItem(itemId) {
      return state.placedItems.find((item) => item.id === Number(itemId));
    }

    function bringItemToFront(itemId) {
      const item = getPlacedItem(itemId);
      if (!item) {
        return null;
      }

      item.zIndex = state.nextZIndex += 1;
      return item;
    }

    function orderedPlacedItems() {
      return [...state.placedItems].sort((a, b) => {
        const rowBreak = Math.max(itemHeight(a), itemHeight(b)) * 0.45;
        if (Math.abs(a.y - b.y) > rowBreak) {
          return a.y - b.y;
        }

        if (Math.abs(a.x - b.x) > 4) {
          return a.x - b.x;
        }

        return a.zIndex - b.zIndex;
      });
    }

    function currentText() {
      return orderedPlacedItems()
        .filter((item) => item.kind === "letter" || item.kind === "space")
        .map((item) => item.char)
        .join("");

    function refreshBuiltWord() {
      if (!builtWord) {
        return;
      }
      const text = currentText();
      builtWord.textContent = text || "None yet";

    function applyPlacedStyles(element, item) {
      element.style.width = `${item.size}px`;
      if (item.kind === "space" || item.kind === "icon") {
        element.style.height = `${itemHeight(item)}px`;
      } else {
        element.style.removeProperty("height");
      }
      element.style.left = `${Math.round(item.x)}px`;
      element.style.top = `${Math.round(item.y)}px`;
      element.style.transform = `rotate(${normalizeRotation(item.rotation || 0)}deg)`;
      element.style.zIndex = item.zIndex;
    }

    function createResizeHandle(item) {
      const resizeHandle = document.createElement("button");
      resizeHandle.type = "button";
      resizeHandle.className = "resize-handle";
      resizeHandle.dataset.itemId = item.id;

          : `${item.char} tile`;
      resizeHandle.setAttribute("aria-label", `Resize ${label}`);
      return resizeHandle;

      const rotateHandle = document.createElement("button");

      rotateHandle.setAttribute("aria-label", `Rotate ${label}`);
      return rotateHandle;

    function renderPlacedSpelling() {
      spellStage.innerHTML = "";

      [...state.placedItems]
        .sort((a, b) => a.zIndex - b.zIndex)
        .forEach((item) => {
          const tile = document.createElement("div");
          tile.className = item.kind === "space" ? "space-chip" : item.kind === "icon" ? "placed-icon" : "placed-tile";
          tile.dataset.itemId = item.id;
          applyPlacedStyles(tile, item);

          if (item.kind === "space") {
            tile.textContent = "Space";
          } else if (item.kind === "icon") {
            const image = document.createElement("img");
            image.src = item.src;
            image.alt = item.label;
            image.draggable = false;
            tile.appendChild(image);
          } else {
            const image = document.createElement("img");
            image.src = imagePathForCharacter(item.char);
            image.alt = `${item.char} letter tile`;
            image.draggable = false;
            tile.appendChild(image);
          }
          spellStage.appendChild(tile);
        });

      refreshBuiltWord();
    }

    function createLetterCard(letter) {
      const lowercase = letter.toLowerCase();
      const card = document.createElement("div");
      card.className = "letter-card";
      card.tabIndex = 0;
      card.dataset.uppercase = letter;
      card.dataset.lowercase = lowercase;
      card.dataset.caseMode = "upper";
      card.setAttribute("aria-label", `Capital ${letter} card. Double-tap to flip to lowercase.`);

      const inner = document.createElement("div");
      inner.className = "letter-card-inner";

      const front = document.createElement("div");
      front.className = "letter-face front";
      const frontImage = document.createElement("img");
      frontImage.src = uppercaseImagePath(letter);
      frontImage.alt = `${letter} uppercase card`;
      frontImage.draggable = false;
      front.appendChild(frontImage);

      const back = document.createElement("div");
      back.className = "letter-face back";
      const backImage = document.createElement("img");
      backImage.src = lowercaseImagePath(lowercase);
      backImage.alt = `${lowercase} lowercase card`;
      backImage.draggable = false;
      back.appendChild(backImage);

      inner.appendChild(front);
      inner.appendChild(back);
      card.appendChild(inner);

      card.addEventListener("pointerdown", handleBankCardPointerDown);
      card.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          toggleCardFlip(card);
        }
      });

      return card;
    }

    function renderLetterBank() {
      letterBank.innerHTML = "";
      alphabet.forEach((letter) => {
        letterBank.appendChild(createLetterCard(letter));
      });
    }

    function createIconChip(icon, surface) {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "icon-chip";
      chip.dataset.assetId = icon.id;
      chip.dataset.surface = surface;
      chip.setAttribute("aria-label", `${icon.label} asset`);

      const image = document.createElement("img");
      image.src = icon.src;
      image.alt = icon.label;
      image.draggable = false;
      chip.appendChild(image);
      chip.addEventListener("pointerdown", handleIconChipPointerDown);
      return chip;
    }

    function renderIconBank(container, surface, assets = ICON_DEFS) {
      container.innerHTML = "";
      assets.forEach((icon) => {
        container.appendChild(createIconChip(icon, surface));
      });

    function renderBoardAssetBank() {
      renderIconBank(boardIconBank, "board", BOARD_ASSET_SETS[state.boardAssetMode] || ICON_DEFS);

        button.classList.toggle("active", button.dataset.boardMode === state.boardAssetMode);
      });

    function setBoardAssetMode(mode) {
      if (!BOARD_ASSET_SETS[mode]) {
        return;

      state.boardAssetMode = mode;
      renderBoardAssetBank();

    function setBoardPenMode(isOn) {
      state.boardPenMode = Boolean(isOn);
      boardWrap.classList.toggle("pen-mode", state.boardPenMode);

        "aria-label",
        state.boardPenMode

          : "Pen mode off. Move, resize, and rotate board items."

          : "Eraser tool off. Click once to choose eraser or click twice for eraser size."
